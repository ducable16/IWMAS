  # --------------------------------------------------------------------------
  # Postgres — mặc định chạy LOCAL trên host nên để comment.
  # Bỏ comment nếu muốn chạy DB trong container (nhớ trỏ datasource sang đây).
  # --------------------------------------------------------------------------
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: postgres
  #   environment:
  #     POSTGRES_DB: workforce
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: password
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data
  #   mem_limit: 256m
  #   restart: unless-stopped

volumes:
  rabbitmq_data:
  redis_data:
  es_data:
#  minio_data:
#  pg_data:

# ============================================================================
# GHI CHÚ TRIỂN KHAI trên EC2 2GB
# ----------------------------------------------------------------------------
# 1) Tạo swap 2GB (BẮT BUỘC — nếu không ES dễ bị OOM kill):
#      sudo fallocate -l 2G /swapfile
#      sudo chmod 600 /swapfile && sudo mkswap /swapfile && sudo swapon /swapfile
#      echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
#
# 2) ES yêu cầu vm.max_map_count cao:
#      sudo sysctl -w vm.max_map_count=262144
#      echo 'vm.max_map_count=262144' | sudo tee -a /etc/sysctl.conf
#
# 3) Khởi động hạ tầng:
#      docker compose -f docker-compose.slim.yml up -d
#
# 4) Java app: KHÔNG chạy bằng mvn. Build JAR (artifact iwas-jar từ CI), rồi
#    chạy bằng java -jar dưới systemd với heap giới hạn, ví dụ:
#      ExecStart=/usr/bin/java -Xmx448m -jar /opt/iwas/iwas.jar
# ============================================================================
