# ============================================================================
# docker-compose.slim.yml — bản rút gọn cho EC2 1 vCPU / 2GB RAM (demo ĐATN)
# ----------------------------------------------------------------------------
# So với docker-compose.yml gốc:
#   - BỎ Kibana   (chỉ để xem dashboard, không phải chức năng lõi)
#   - BỎ Logstash (app dùng LogstashTcpSocketAppender async + log ra console,
#                  thiếu Logstash app vẫn chạy, chỉ không ship log sang ES)
#   - GIỮ Elasticsearch (heap hạ 1g -> 512m), RabbitMQ, Redis, MinIO
#   - Mỗi service đặt mem_limit để 1 container không "ăn" hết RAM máy
#
# Kiến trúc giả định: Postgres chạy LOCAL trên host, Java app chạy bằng
# `java -jar` dưới systemd (KHÔNG dùng mvn spring-boot:run). Postgres để dạng
# service comment ở cuối — bỏ comment nếu muốn chạy DB trong container luôn.
#
# Ngân sách RAM ước lượng:
#   ES ~0.8GB + Redis ~0.05 + RabbitMQ ~0.12 + MinIO ~0.15
#   + Postgres(host) ~0.15 + Java app ~0.55 + OS/Docker ~0.35  ≈ 2.1GB
#   => SÁT NÓC 2GB. Bắt buộc tạo swap 2GB (xem ghi chú cuối file).
# ============================================================================

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI (có thể bỏ để tiết kiệm)
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
      # Cho Erlang VM dùng ít RAM hơn
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: "0.4"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    mem_limit: 300m
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    # Giới hạn RAM nội bộ Redis + chính sách eviction (dùng làm cache)
    command: ["redis-server", "--maxmemory", "96mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    mem_limit: 150m
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - bootstrap.memory_lock=false
      # Heap hạ từ 1g -> 512m (đủ cho data nhỏ của demo)
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      # Tắt disk watermark để không bị read-only khi đĩa EC2 nhỏ/đầy
      - cluster.routing.allocation.disk.threshold_enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

#  minio:
