<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Verification Code</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 480px; margin: 40px auto; background: #ffffff; border-radius: 8px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .otp-box { font-size: 36px; font-weight: bold; letter-spacing: 10px; color: #2c3e50; text-align: center; background: #f0f4ff; border-radius: 8px; padding: 20px; margin: 24px 0; }
        p { color: #555555; line-height: 1.6; }
        .footer { font-size: 12px; color: #aaaaaa; margin-top: 24px; }
    </style>
</head>
<body>
<div class="container">
    <h3>Verify your RoamTrip account</h3>
    <p>Use the verification code below to confirm your email address. This code expires in <strong>10 minutes</strong>.</p>
    <div class="otp-box" th:text="${otp}">000000</div>
    <p>If you did not request this, you can safely ignore this email.</p>
    <p class="footer">Do not share this code with anyone.</p>
</div>
</body>
</html>
