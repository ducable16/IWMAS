spring:
  application:
    name: IWAS
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 21MB
  datasource:
    url: jdbc:postgresql://localhost:5432/workforce
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 500ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
    elasticsearch:
      repositories:
        enabled: true
  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 1s
    socket-timeout: 3s
  mail:
    username: toilaatmin@gmail.com
    password: laijaybhzvszxfdz
    host: smtp.gmail.com
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 9090

app:
  mail:
    from: toilaatmin@gmail.com
  rabbitmq:
    email-queue: email.verification
    search-user-sync-queue: search.user.sync
    search-user-sync-exchange: search.sync.user.exchange
    search-project-sync-queue: search.project.sync
    search-project-sync-exchange: search.project.exchange
  search:
    bootstrap-on-startup: true
    autocomplete:
      max-suggestions: 10
      cache-ttl-seconds: 60
      min-prefix-length: 2
    elasticsearch:
      user-index: iwas-users
      project-index: iwas-projects
      max-page-size: 50
  arrangement:
    k: 2.0
    weights:
      CRITICAL: 8
      HIGH: 4
      MEDIUM: 2
      LOW: 1
  frontend:
    base-url: http://localhost:3000
  ws:
    endpoint: /ws
    allowed-origins: http://localhost:3000,http://localhost:3001
    heartbeat:
      incoming-ms: 10000
      outgoing-ms: 10000
  storage:
    # Dev mặc định dùng MinIO (S3-compatible). Prod chuyển sang AWS S3 ở application-prod.yml.
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: iwas
    region: us-east-1
    path-style-access: true               # MinIO bắt buộc path-style
  jwt:
    secret: hs5p8JHcpEdoZeiE5uRIDCev4rMczXRP
    access-expiration-ms: 3600000
    refresh-expiration-ms: 604800000
    expiration: 86400000

logging:
  level:
    org.hibernate: ERROR