input {
  tcp {
    port => 5000
    codec => json_lines
  }
  beats {
    port => 5044
  }
}

filter {
  # Drop healthcheck / actuator noise if it ever appears
  if [logger_name] =~ /^org\.springframework\.boot\.actuate/ {
    drop { }
  }

  # Mask common secrets in free-form messages
  mutate {
    gsub => [
      "message", "(?i)(password|passwd|pwd|secret|otp|refreshToken|accessToken)\s*[:=]\s*\"?[^\s\",}]+", "\1=***",
      "message", "Bearer\s+[A-Za-z0-9\-_\.]+", "Bearer ***"
    ]
  }

  # Normalize log level field name
  if [level] {
    mutate { rename => { "level" => "log_level" } }
  }
}

output {
  if [stream] == "search" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "iwas-search-events-%{+YYYY.MM.dd}"
    }
  } else if [log_level] in ["WARN", "ERROR"] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "iwas-app-errors-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "iwas-app-%{+YYYY.MM.dd}"
    }
  }
  stdout { codec => rubydebug }
}