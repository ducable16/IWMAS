name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Debug deploy secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "========== DEPLOY CONFIG =========="

          echo "EC2_HOST=$EC2_HOST"
          echo "EC2_USERNAME=$EC2_USERNAME"

          echo "EC2_SSH_KEY:"
          if [ -z "$EC2_SSH_KEY" ]; then
            echo "EMPTY"
          else
            echo "SET"
            echo "Length: ${#EC2_SSH_KEY}"
            echo "First line: $(printf '%s\n' "$EC2_SSH_KEY" | head -n 1)"
            echo "Last line: $(printf '%s\n' "$EC2_SSH_KEY" | tail -n 1)"
          fi

          echo "==================================="

          echo "Resolved EC2 host:"
          getent ahostsv4 "$EC2_HOST" || true

          echo "Runner public IP:"
          curl -s https://checkip.amazonaws.com

          echo "Test port 22:"
          nc -vz -w 10 "$EC2_HOST" 22 || true
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/iwas.jar"
          target: "/home/ec2-user"

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl restart iwas