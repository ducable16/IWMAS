name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Hủy các lần chạy cũ trên cùng một branch/PR khi có commit mới
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (Java service)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      # CI chỉ build & test riêng service Java; hạ tầng (Postgres/Redis/ES/RabbitMQ)
      # KHÔNG dựng trong pipeline. Vì vậy loại IWASApplicationTests (@SpringBootTest
      # load full context, cần các service đó) ra khỏi lần chạy CI để pipeline luôn xanh.
      - name: Build & run unit tests
        run: >
          ./mvnw -B --no-transfer-progress verify
          -Dtest='!IWASApplicationTests'
          -DfailIfNoTests=false

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

      - name: Upload application JAR
        uses: actions/upload-artifact@v4
        with:
          name: iwas-jar
          path: target/*.jar
          if-no-files-found: error
